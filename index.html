<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trading Report · BAKERY GRP.68,78</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- App Styles -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="loginScreen">
  <div class="login-strip"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo-box"><img id="loginLogo" alt="Makro"></div>
    </div>
    <div class="login-title">
      <h1>Trading Report</h1>
      <p>BAKERY GRP.68,78 &mdash; ระบบบันทึกการตรวจนับสต็อก<br>CP Axtra / Makro Thailand</p>
    </div>
    <div class="login-err" id="loginErr">ชื่อผู้ใช้ หรือ รหัสผ่าน ไม่ถูกต้อง</div>
    <form id="loginForm" autocomplete="off">
      <div class="fgroup">
        <label>Username</label>
        <input type="text" id="fUser" placeholder="กรอกรหัสผู้ใช้งาน" required>
      </div>
      <div class="fgroup" style="margin-bottom:20px">
        <label>Password</label>
        <input type="password" id="fPass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-blue w100" style="padding:14px;font-size:15px;font-weight:700;border-radius:var(--r12)">เข้าสู่ระบบ</button>
    </form>
    <div class="login-foot">CP Axtra &mdash; Store Operations &middot; v4.0</div>
  </div>
</div>

<!-- ════════════ APP ════════════ -->
<div id="app" class="hidden">
  <div class="sb-backdrop" id="sbBd"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo-box"><img id="sbLogo" alt="Makro"></div>
      <div class="sb-user-chip">
        <div class="sb-user-avatar" id="sbAvatar">🏪</div>
        <div>
          <div class="sb-user-name" id="sbName">&nbsp;</div>
          <div class="sb-user-role" id="sbRole">&nbsp;</div>
        </div>
      </div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div class="sb-foot-brand">🥐 BAKERY GRP.68,78 &middot; CP Axtra</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-ghost btn-icon menu-btn" id="menuBtn">&#9776;</button>
        <div>
          <div class="topbar-title" id="tbTitle">&nbsp;</div>
          <div class="topbar-sub" id="tbSub">&nbsp;</div>
        </div>
      </div>
      <div class="flex gap8 items-c">
        <div class="topbar-breadcrumb" id="tbBread"></div>
        <span id="fbConnIndicator" style="font-size:11px;font-weight:600;color:var(--txt3)">⏳</span>
        <button class="btn btn-secondary btn-sm" id="logoutBtn">ออกจากระบบ</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<!-- Firebase SDK (compat v10) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- SheetJS (Excel export) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- App scripts (order matters: firebase.js loads config, app.js loads data + logic) -->
<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
